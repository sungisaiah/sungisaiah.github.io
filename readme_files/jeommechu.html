<title>오늘 점/저메추</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:transparent;color:#2c2c2c}
body{padding:16px}
.lp{max-width:480px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.lp-title{text-align:center;font-size:22px;font-weight:700;margin:0 0 4px}
.lp-sub{text-align:center;font-size:13px;color:#999;margin:0 0 18px}
.lp-cats{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.lp-cat{padding:6px 11px;font-size:12px;border:1.5px solid #e8e8e8;border-radius:999px;background:#fff;cursor:pointer;color:#666;font-family:inherit;transition:all 0.15s}
.lp-cat:hover{border-color:#ccc}
.lp-cat.active{background:#ff6b35;border-color:#ff6b35;color:#fff}
.lp-count{font-size:11px;color:#aaa;text-align:center;margin-bottom:14px}
.lp-display{background:#faf8f5;border-radius:14px;padding:32px 20px;text-align:center;margin-bottom:16px;min-height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.lp-emoji{font-size:56px;line-height:1;margin-bottom:10px}
.lp-name{font-size:26px;font-weight:700;color:#222}
.lp-cat-label{font-size:12px;color:#888;margin-top:4px}
.lp-pick{width:100%;padding:14px;background:#ff6b35;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s}
.lp-pick:hover{background:#e85a28}
.lp-pick:active{transform:scale(0.98)}
.lp-pick:disabled{opacity:0.6;cursor:wait}
.lp-history{margin-top:14px;font-size:12px;color:#aaa;text-align:center;min-height:16px}
.lp-spin .lp-emoji,.lp-spin .lp-name{animation:lp-shake 0.08s linear infinite}
@keyframes lp-shake{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
</style>
</head>

const CATS=['전체','한식','중식','일식','양식','분식','아시안','패스트푸드','멕시칸','샐러드'];
let cur='전체',history=[];
try{history=JSON.parse(localStorage.getItem('lp-history')||'[]')}catch(e){}
let last=null,spinning=false;
const $cats=document.getElementById('lp-cats');
const $count=document.getElementById('lp-count');
const $emoji=document.getElementById('lp-emoji');
const $name=document.getElementById('lp-name');
const $label=document.getElementById('lp-cat-label');
const $display=document.getElementById('lp-display');
const $pick=document.getElementById('lp-pick');
const $history=document.getElementById('lp-history');

function updateCount(){
  const n=cur==='전체'?MENUS.length:MENUS.filter(m=>m.c===cur).length;
  $count.textContent=cur+' · '+n+'개';
}

CATS.forEach(c=>{
  const b=document.createElement('button');
  b.className='lp-cat'+(c===cur?' active':'');
  b.textContent=c;
  b.onclick=()=>{
    cur=c;
    [...$cats.children].forEach(x=>x.classList.toggle('active',x.textContent===c));
    updateCount();
  };
  $cats.appendChild(b);
});
updateCount();

if(history.length>0){
  $history.textContent='최근: '+history.slice(0,4).join(' · ');
}

function pool(){return cur==='전체'?MENUS:MENUS.filter(m=>m.c===cur)}

function pick(){
  if(spinning)return;
  spinning=true;$pick.disabled=true;$display.classList.add('lp-spin');
  const p=pool();
  if(p.length===0){$name.textContent='메뉴 없음';$label.textContent='';spinning=false;$pick.disabled=false;$display.classList.remove('lp-spin');return}
  let avail=p;
  if(last&&p.length>1)avail=p.filter(m=>m.n!==last.n);
  const final=avail[Math.floor(Math.random()*avail.length)];
  let count=0;const total=18;
  const iv=setInterval(()=>{
    const f=p[Math.floor(Math.random()*p.length)];
    $emoji.textContent=f.e;$name.textContent=f.n;$label.textContent='';
    count++;
    if(count>=total){
      clearInterval(iv);
      $emoji.textContent=final.e;$name.textContent=final.n;$label.textContent=final.c;
      $display.classList.remove('lp-spin');
      last=final;history.unshift(final.n);
      if(history.length>8)history.pop();
      try{localStorage.setItem('lp-history',JSON.stringify(history))}catch(e){}
      $history.textContent=history.length>1?'최근: '+history.slice(1,5).join(' · '):'';
      spinning=false;$pick.disabled=false;
    }
  },70);
}
document.getElementById('lp-pick').onclick=pick;
</script>
